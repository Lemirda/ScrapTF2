name: Build EXE and Draft Release

on:
  push:
    branches:
      - '**'  # каждый коммит на любую ветку

permissions:
  contents: write

jobs:
  build-and-draft-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path 'requirements.txt') { pip install -r requirements.txt }
          # Если build.py сам ставит зависимости/pyinstaller — оставьте как есть,
          # иначе раскомментируйте следующую строку:
          # pip install pyinstaller

      - name: Build
        shell: pwsh
        run: python build.py

      - name: Commit subject (single line)
        id: commit
        shell: bash
        run: echo "subject=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Find EXE
        id: find_exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path dist -Filter *.exe -Recurse | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found (expected in dist/*). Adjust the path."; exit 1 }
          $p = $exe.FullName -replace '\\','/'
          echo "path=$p" >> $env:GITHUB_OUTPUT

      - name: Draft release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: build-${{ github.sha }}
          name: ${{ steps.commit.outputs.subject }}
          files: ${{ steps.find_exe.outputs.path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}